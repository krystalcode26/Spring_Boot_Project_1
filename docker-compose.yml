services:
  jenkins:
    build: ./jenkins
    image: jenkins-with-docker
    container_name: ems-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPOSE_DIR:-.}:/home/ec2-user/ems-backend
    environment:
      JENKINS_IN_DOCKER: "true"
      COMPOSE_DIR: /home/ec2-user/ems-backend
      EC2_HOST: ${EC2_HOST:-18.225.218.150}

  db:
    image: postgres:17
    container_name: ems-postgres
    environment:
      POSTGRES_DB: sms
      POSTGRES_USER: hsuan
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsuan -d sms"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.18
    container_name: ems-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ems-vault-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK

  vault-init:
    image: hashicorp/vault:1.18
    container_name: ems-vault-init
    depends_on:
      vault:
        condition: service_started
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ems-vault-token
      DOWNSTREAM_APPLICATION_URL: http://3.21.129.124:8080
      DOWNSTREAM_APPLICATION_PATH: /api/v1/integrations/name/aggregation
      UPSTREAM_APPLICATION_URL: http://3.134.97.56:8080
      UPSTREAM_APPLICATION_PATH: /name/notify
      APP_STUDENT_NAME: Krystal
    volumes:
      - ./scripts/vault-init.sh:/vault-init.sh:ro
    entrypoint: ["/bin/sh", "/vault-init.sh"]
    restart: "no"

  app:
    image: krystalyang/ems:latest
    build: .
    container_name: ems-backend
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_VAULT_TOKEN: ems-vault-token
    depends_on:
      db:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully

volumes:
  jenkins_home:
  postgres-data:
