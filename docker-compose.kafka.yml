# 3-broker Kafka cluster (KRaft). Use alone or with root docker-compose.yml.
# Local bootstrap: localhost:9092,localhost:9093,localhost:9094
# In-docker bootstrap: kafka-1:19092,kafka-2:19092,kafka-3:19092

x-kafka-broker-env: &kafka-broker-env
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
  CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw

x-kafka-healthcheck: &kafka-healthcheck
  test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092
  interval: 10s
  timeout: 10s
  retries: 12
  start_period: 30s

services:
  kafka-1:
    image: apache/kafka:3.9.0
    container_name: kafka-1
    hostname: kafka-1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:19092,CONTROLLER://kafka-1:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:19092,PLAINTEXT_HOST://localhost:9092
    healthcheck:
      <<: *kafka-healthcheck

  kafka-2:
    image: apache/kafka:3.9.0
    container_name: kafka-2
    hostname: kafka-2
    ports:
      - "9093:9092"
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:19092,CONTROLLER://kafka-2:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:19092,PLAINTEXT_HOST://localhost:9093
    healthcheck:
      <<: *kafka-healthcheck

  kafka-3:
    image: apache/kafka:3.9.0
    container_name: kafka-3
    hostname: kafka-3
    ports:
      - "9094:9092"
    environment:
      <<: *kafka-broker-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:19092,CONTROLLER://kafka-3:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:19092,PLAINTEXT_HOST://localhost:9094
    healthcheck:
      <<: *kafka-healthcheck

  kafka-init:
    image: apache/kafka:3.9.0
    container_name: kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists
      --topic student-events
      --partitions 3
      --replication-factor 3
      --bootstrap-server kafka-1:19092 &&
      /opt/kafka/bin/kafka-topics.sh --describe
      --topic student-events
      --bootstrap-server kafka-1:19092
    restart: "no"
