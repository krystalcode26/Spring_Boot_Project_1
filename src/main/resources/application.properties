server.port=8088

spring.application.name=sms-backend

# Vault off for normal local run; enabled in docker/vault profiles
spring.cloud.vault.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/sms
spring.datasource.username=hsuan
spring.datasource.password=

# JPA/Hibernate — students table managed by Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JDBC schema init — staffs table only (Staff uses JdbcTemplate)
# Spring also creates a JdbcTemplate bean (from spring-boot-starter-data-jpa, which includes JDBC
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Actuator - expose health and metrics endpoints
# Prometheus is a time series database that is used to store metrics data.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.endpoint.prometheus.access=read-only
management.prometheus.metrics.export.enabled=true

# Cache - in-memory Caffeine cache for single instance
spring.cache.type=caffeine
spring.cache.cache-names=students,staffs
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=10m

# Logging use for info and debug
logging.level.net.javaguides.ems=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG

# Integration URLs — local defaults; overridden by Vault when spring.config.import=vault:// (docker profile)
downstream.application.enabled=true
downstream.application.url=http://3.21.129.124:8080
downstream.application.path=/api/v1/integrations/name/aggregation

upstream.application.enabled=true
upstream.application.url=http://3.134.97.56:8080
upstream.application.path=/name/notify

app.student.name=Krystal
app.frontend-url=http://localhost:4200

# Async module calls timeout (seconds)
integration.async.timeout-seconds=10

# Failed integration recovery — persist downstream calls and replay later
integration.recovery.enabled=true
integration.recovery.max-attempts=5
integration.recovery.fixed-delay-ms=60000

# Circuit breaker — downstream module (classmate EC2)
resilience4j.circuitbreaker.instances.downstreamModule.sliding-window-size=10
resilience4j.circuitbreaker.instances.downstreamModule.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.downstreamModule.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.downstreamModule.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.downstreamModule.automatic-transition-from-open-to-half-open-enabled=true

# Retry — downstream module (before circuit breaker opens)
resilience4j.retry.instances.downstreamModule.max-attempts=3
resilience4j.retry.instances.downstreamModule.wait-duration=500ms
resilience4j.retry.instances.downstreamModule.retry-exceptions[0]=org.springframework.web.client.RestClientException
resilience4j.retry.instances.downstreamModule.retry-exceptions[1]=java.io.IOException

# Circuit breaker — upstream module
resilience4j.circuitbreaker.instances.upstreamModule.sliding-window-size=10
resilience4j.circuitbreaker.instances.upstreamModule.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.upstreamModule.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.upstreamModule.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.upstreamModule.automatic-transition-from-open-to-half-open-enabled=true

# Security — off by default (no login required). Enable JWT with profile "auth":
#   ./mvnw spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=auth
# See application-auth.properties for JWT / OAuth / seed accounts (admin / admin123).

# Kafka — enable when brokers are running (see docker-compose.kafka.yml)
kafka.enabled=false
kafka.topic-employee-events=employee-events
kafka.topic-employee-events-dlt=employee-events.DLT
kafka.topic-partitions=3
kafka.topic-replicas=3
kafka.consumer-group-id=notification-service
kafka.consumer-concurrency=3

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
spring.kafka.consumer.group-id=${kafka.consumer-group-id}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3