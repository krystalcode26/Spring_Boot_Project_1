spring.application.name=sms-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/sms
spring.datasource.username=hsuan
spring.datasource.password=

# hibernate automatically create database tables based on jpa entity
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# Actuator - expose health and metrics endpoints
# Prometheus is a time series database that is used to store metrics data.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=read-only
management.prometheus.metrics.export.enabled=true

# Cache - in-memory Caffeine cache
spring.cache.type=caffeine
spring.cache.cache-names=students
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=10m

# Logging
logging.level.net.javaguides.ems=INFO
logging.level.org.hibernate.SQL=DEBUG
