spring.application.name=sms-backend
spring.datasource.url=jdbc:postgresql://localhost:5432/sms
spring.datasource.username=hsuan
spring.datasource.password=

# JPA/Hibernate — students table managed by Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JDBC schema init — staffs table only (Staff uses JdbcTemplate)
# Spring also creates a JdbcTemplate bean (from spring-boot-starter-data-jpa, which includes JDBC
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Actuator - expose health and metrics endpoints
# Prometheus is a time series database that is used to store metrics data.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=read-only
management.prometheus.metrics.export.enabled=true

# Cache - in-memory Caffeine cache for single instance
spring.cache.type=caffeine
spring.cache.cache-names=students,staffs
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=10m

# Logging use for info and debug
logging.level.net.javaguides.ems=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG
