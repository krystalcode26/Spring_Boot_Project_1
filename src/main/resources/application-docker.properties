# Docker profile — used when SPRING_PROFILES_ACTIVE=docker
spring.datasource.url=jdbc:postgresql://db:5432/sms
spring.datasource.username=hsuan
spring.datasource.password=

# HashiCorp Vault — integration URLs and secrets loaded at startup
spring.cloud.vault.enabled=true
spring.config.import=vault://
spring.cloud.vault.uri=http://vault:8200
spring.cloud.vault.token=${SPRING_CLOUD_VAULT_TOKEN:ems-vault-token}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=ems-backend

# Let Hibernate create employee/department tables before schema.sql runs
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.jdbc.core=WARN
logging.level.org.springframework.vault=INFO

# Security — set via environment variables on EC2 / Docker
security.enabled=true
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=3600000
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-dev-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-dev-placeholder}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com

security.seed.user-email=user@ems.com
security.seed.user-credential=${SEED_USER_CREDENTIAL:user123}
security.seed.user-role=ROLE_USER
security.seed.admin-email=admin@ems.com
security.seed.admin-credential=${SEED_ADMIN_CREDENTIAL:admin123}
security.seed.admin-role=ROLE_ADMIN

app.frontend-url=http://localhost:4200

kafka.enabled=true
kafka.topic-employee-events=employee-events
kafka.topic-employee-events-dlt=employee-events.DLT
kafka.topic-partitions=3
kafka.topic-replicas=3
kafka.consumer-group-id=notification-service
kafka.consumer-concurrency=3
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka-1:19092,kafka-2:19092,kafka-3:19092}
