# Activate with: --spring.profiles.active=auth
# Example: ./mvnw spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=auth

security.jwt.secret=${JWT_SECRET:change-me-use-env-JWT_SECRET-in-production}
security.jwt.expiration-ms=3600000

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-dev-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-dev-placeholder}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com

# Demo login (password BCrypt-hashed at seed time, never stored/compared as plaintext)
security.seed.user-email=user
security.seed.user-credential=user123
security.seed.user-role=ROLE_USER
security.seed.admin-email=admin
security.seed.admin-credential=admin123
security.seed.admin-role=ROLE_ADMIN
