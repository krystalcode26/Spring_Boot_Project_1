spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

spring.cloud.vault.enabled=false

downstream.application.url=http://localhost:8080
downstream.application.path=/api/v1/integrations/name/aggregation
upstream.application.url=http://localhost:8080
upstream.application.path=/name/notify
app.student.name=Test
integration.recovery.enabled=false

# Default tests run without the "auth" profile (open API, matches earlier exercises).
# Auth-focused tests use @ActiveProfiles("auth").
security.jwt.secret=test-secret-key-for-unit-tests-only-must-be-long-enough
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

security.seed.user-email=user
security.seed.user-credential=user123
security.seed.user-role=ROLE_USER
security.seed.admin-email=admin
security.seed.admin-credential=admin123
security.seed.admin-role=ROLE_ADMIN

# Kafka off in default unit tests (see KafkaIntegrationTest for embedded broker)
kafka.enabled=false
kafka.topic-employee-events=employee-events
kafka.topic-employee-events-dlt=employee-events.DLT
kafka.topic-partitions=3
kafka.topic-replicas=1
kafka.consumer-group-id=notification-service
kafka.consumer-concurrency=3
