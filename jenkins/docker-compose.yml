services:
  jenkins:
    build: .
    image: jenkins-with-docker
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPOSE_DIR:-..}:/home/ec2-user/ems-backend
    env_file:
      - .env
    environment:
      EC2_HOST: ${EC2_HOST:-18.225.218.150}

volumes:
  jenkins_home:
