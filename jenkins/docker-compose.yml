# jenkins service
# start docker container in local env
#
# SonarQube setup (one-time):
# 1. docker compose up -d
# 2. Open http://localhost:9000 (admin/admin), change password, create Global Analysis Token
# 3. Jenkins -> Credentials -> Secret text ID: sonar-token
# 4. Jenkins -> Manage Jenkins -> System -> SonarQube servers:
#      Name: sonarqube, URL: http://sonarqube:9000, Token: sonar-token
# 5. SonarQube -> Administration -> Webhooks -> http://jenkins:8080/sonarqube-webhook/
# 6. SonarQube -> General Settings -> Server base URL: http://localhost:9000
# 7. Jenkins build: check SONAR_ENABLED when running pipeline
services:
  jenkins:
    build: .
    image: jenkins-with-docker
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"                      # Jenkins UI -> http://localhost:8081
      - "50000:50000"                    # Jenkins agent port
    volumes:
      - jenkins_home:/var/jenkins_home   # persist Jenkins data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPOSE_DIR:-..}:/home/ec2-user/ems-backend  # jenkins service point to ems-backend, so local project can access to this pipeline
      - ${SSH_KEY_PATH:-/Users/hsuan/.ssh/ems-jenkins-key.pem}:/run/secrets/ec2-ssh-key.pem:ro
    env_file:
      - .env
    environment:
      EC2_HOST: ${EC2_HOST:-18.225.218.150}
    depends_on:
      - sonarqube

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"                      # SonarQube UI -> http://localhost:9000
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  jenkins_home:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
